<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TA Portal — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0f1e; --surface: #111827; --card: #1a2235;
      --accent: #4f8ef7; --accent2: #38e5b0; --text: #e8edf7;
      --muted: #7a8ba8; --border: rgba(79,142,247,0.15);
      --error: #f77474; --success: #38e5b0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.1; pointer-events: none; }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; }
    .blob2 { width: 350px; height: 350px; background: var(--accent2); bottom: -100px; right: -100px; }

    .auth-wrapper { position: relative; z-index: 1; width: 100%; max-width: 440px; }
    .logo-link { display: flex; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 24px; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); }
    .logo-text span { color: var(--accent); }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.4rem; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap .icon { position: absolute; left: 14px; font-size: 1rem; }
    input { width: 100%; padding: 12px 14px 12px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; }
    input:focus { outline: none; border-color: var(--accent); }
    .pw-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 1rem; }

    .btn-submit { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 0.98rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert { display: none; padding: 12px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; }
    .alert.error { display: block; background: rgba(247,116,116,0.1); color: var(--error); border: 1px solid rgba(247,116,116,0.3); }
    .alert.success { display: block; background: rgba(56,229,176,0.1); color: var(--success); border: 1px solid rgba(56,229,176,0.3); }

    .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-note { text-align: center; margin-top: 18px; font-size: 0.85rem; color: var(--muted); }
    .bottom-note a { color: var(--accent); text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="auth-wrapper">
    <a href="index.html" class="logo-link"><span class="logo-text">TA<span>Portal</span></span></a>

    <div class="card">
      <h1>🔑 Reset Your Password</h1>
      <div class="sub" id="reset-sub">Enter a new password for your account.</div>

      <div class="alert" id="reset-error"></div>

      <div id="reset-form">
        <div class="field">
          <label>New Password</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="new-password" placeholder="At least 8 characters"/>
            <button class="pw-toggle" onclick="togglePw('new-password', this)">👁️</button>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="confirm-password" placeholder="Re-enter password"/>
          </div>
        </div>
        <button class="btn-submit" id="reset-btn" onclick="handleReset()">
          <span class="spinner" id="reset-spinner"></span>
          <span id="reset-btn-text">Update Password →</span>
        </button>
      </div>

      <div class="bottom-note">
        <a href="login.html">← Back to Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://loxxobhsyhqaslpqqrqe.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxveHhvYmhzeWhxYXNscHFxcnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDMyOTMsImV4cCI6MjA5MDE3OTI5M30.PIBtJi8GkRvmE47-KA0JIuRi8JmpbDAPpxyLN7420gM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function showAlert(type, msg) {
      const el = document.getElementById('reset-error');
      el.className = `alert ${type}`;
      el.textContent = msg;
    }
    function clearAlert() {
      const el = document.getElementById('reset-error');
      el.className = 'alert';
      el.textContent = '';
    }
    function setLoading(on) {
      document.getElementById('reset-btn').disabled = on;
      document.getElementById('reset-spinner').style.display = on ? 'block' : 'none';
      document.getElementById('reset-btn-text').style.opacity = on ? 0.4 : 1;
    }

    async function handleReset() {
      clearAlert();
      const pass    = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!pass || pass.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.'); return;
      }
      if (pass !== confirm) {
        showAlert('error', 'Passwords do not match.'); return;
      }

      setLoading(true);
      const { error } = await sb.auth.updateUser({ password: pass });
      setLoading(false);

      if (error) {
        showAlert('error', error.message); return;
      }
      showAlert('success', '✅ Password updated! Redirecting to your dashboard...');
      document.getElementById('reset-form').style.display = 'none';
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    }

    // The reset link puts the recovery session in the URL — Supabase's client
    // picks it up automatically. If there's no valid session at all, this
    // page was opened without a real reset link, so guide the person back.
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        document.getElementById('reset-sub').textContent =
          'This reset link looks invalid or has expired.';
        document.getElementById('reset-form').style.display = 'none';
        showAlert('error', 'Please request a new reset link from the Login page.');
      }
    })();
  </script>
</body>
</html>
